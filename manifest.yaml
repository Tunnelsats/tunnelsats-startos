id: tunnelsats
title: "TunnelSats"
version: 0.3.0
release-notes: "v0.3.0: Fixes StartOS status page configuration loop ('Needs Config') via dynamic dependency tracking; adds multiple resolution browser favicons; ports GitHub issue templates."
license: "MIT"
wrapper-repo: "https://github.com/Tunnelsats/tunnelsats-startos"
upstream-repo: "https://github.com/Tunnelsats/tunnelsats"
support-site: "https://github.com/Tunnelsats/tunnelsats/issues"
marketing-site: "https://tunnelsats.com"
min-os-version: "0.3.5"
description:
  short: "A privacy-focused VPN gateway for Lightning Nodes (LND/CLN)."
  long: "TunnelSats provides premium VPN infrastructure specifically for Lightning Nodes (LND/CLN), enabling clearnet inbound connections and masking outbound peer-to-peer traffic. Please note: TunnelSats is a dedicated Lightning Network VPN, NOT a general VPN for all StartOS system or server traffic."
assets:
  license: LICENSE
  icon: icon.svg
  instructions: README.md
  docker-images: image.tar
main:
  type: docker
  image: main
  entrypoint: "/app/docker_entrypoint.sh"
  args: []
  mounts:
    main: /data
health-checks:
  vpn-connected:
    name: "VPN Connectivity"
    description: "Ensures the WireGuard tunnel is established and active."
    type: docker
    image: main
    inject: true
    system: false
    entrypoint: "python3"
    args: ["bridge.py", "health", "vpn"]
    io-format: json
  proxy-ready:
    name: "SOCKS5 Proxy"
    description: "Verifies that the SOCKS5 proxy is listening for connections."
    type: docker
    image: main
    inject: true
    system: false
    entrypoint: "python3"
    args: ["bridge.py", "health", "proxy"]
    io-format: json
config:
  get:
    type: docker
    image: main
    entrypoint: "python3"
    args: ["bridge.py", "config", "get"]
    mounts:
      main: /data
    io-format: json
  set:
    type: docker
    image: main
    entrypoint: "python3"
    args: ["bridge.py", "config", "set"]
    mounts:
      main: /data
    io-format: json
volumes:
  main:
    type: data
interfaces:
  main:
    name: "SOCKS5 Proxy"
    description: "Internal SOCKS5 proxy interface for Lightning Node routing."
    tor-config:
      port-mapping:
        1080: "1080"
    lan-config:
      1080:
        ssl: false
        internal: 1080
    ui: false
    protocols:
      - tcp
      - http
      - socks5
  ui:
    name: "Web Dashboard"
    description: "TunnelSats Web Dashboard, connection properties, and setup instructions."
    tor-config:
      port-mapping:
        80: "80"
    lan-config:
      443:
        ssl: true
        internal: 80
    ui: true
    protocols:
      - tcp
      - http
backup:
  create:
    type: docker
    image: main
    system: false
    entrypoint: "true"
    args: []
    mounts:
      main: /data
    io-format: json
  restore:
    type: docker
    image: main
    system: false
    entrypoint: "true"
    args: []
    mounts:
      main: /data
    io-format: json
properties:
  type: docker
  image: main
  entrypoint: "python3"
  args: ["bridge.py", "properties"]
  inject: true
  system: false
  io-format: json
dependencies:
  lnd:
    version: ">=0.15.5"
    requirement:
      type: "opt-out"
      how: "Install LND to route traffic through TunnelSats"
    description: "Lightning Network Daemon. Required if you choose LND as your Target Lightning Node for inbound connections."
    critical: false
  c-lightning:
    version: ">=23.02.2"
    requirement:
      type: "opt-out"
      how: "Install Core Lightning to route traffic through TunnelSats"
    description: "Core Lightning. Required if you choose Core Lightning as your Target Lightning Node for inbound connections."
    critical: false
